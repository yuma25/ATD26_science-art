pre-commit:
  parallel: true
  commands:
    linter:
      root: frontend/
      glob: "*.{js,ts,tsx,go,json,md}"
      run: pnpm run lint
    build-check:
      root: frontend/
      glob: "*.{ts,tsx}"
      run: pnpm run build
    test-check:
      root: frontend/
      run: pnpm run test
    formatter:
      glob: "*.{js,ts,tsx,json,md}"
      run: npx prettier --write {staged_files} && git add {staged_files}

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}
